name: Lint

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    name: Super Linter
    uses: harryzcy/github-actions/.github/workflows/linter.yml@d93d9917fa745a4996d968874c2bd88bbd8239fe # main

  go-lint:
    name: Go Lint
    uses: harryzcy/github-actions/.github/workflows/golangci-lint.yml@d93d9917fa745a4996d968874c2bd88bbd8239fe # main
    with:
      working-directory: dotd
