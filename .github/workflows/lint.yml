name: Lint

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    name: Super Linter
    uses: harryzcy/github-actions/.github/workflows/linter.yml@e4a6abc481232ef8f99ea5f2223c18dee962e432 # main

  go-lint:
    name: Go Lint
    uses: harryzcy/github-actions/.github/workflows/golangci-lint.yml@e4a6abc481232ef8f99ea5f2223c18dee962e432 # main
    with:
      working-directory: dotd
