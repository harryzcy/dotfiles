name: Lint

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    name: Super Linter
    uses: harryzcy/github-actions/.github/workflows/linter.yml@4b1a8cebf62d55102a11b7823db49d0dcc82fa51 # main

  go-lint:
    name: Go Lint
    uses: harryzcy/github-actions/.github/workflows/golangci-lint.yml@4b1a8cebf62d55102a11b7823db49d0dcc82fa51 # main
    with:
      working-directory: dotd
