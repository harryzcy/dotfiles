name: Lint

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    name: Super Linter
    uses: harryzcy/github-actions/.github/workflows/linter.yml@454561de2c2e5938ee91113753d92166a5dba935 # main

  go-lint:
    name: Go Lint
    uses: harryzcy/github-actions/.github/workflows/golangci-lint.yml@454561de2c2e5938ee91113753d92166a5dba935 # main
    with:
      working-directory: dotd
