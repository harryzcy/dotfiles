name: Lint

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    name: Super Linter
    uses: harryzcy/github-actions/.github/workflows/linter.yml@04194bc3ab89926d0023537f0c8590ec51735ab9 # main

  go-lint:
    name: Go Lint
    uses: harryzcy/github-actions/.github/workflows/golangci-lint.yml@04194bc3ab89926d0023537f0c8590ec51735ab9 # main
    with:
      working-directory: dotd
