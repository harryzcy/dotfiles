name: Lint

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    name: Super Linter
    uses: harryzcy/github-actions/.github/workflows/linter.yml@719b651276bdeca4bbc8d81e8a51d7fd02d1a17b # main

  go-lint:
    name: Go Lint
    uses: harryzcy/github-actions/.github/workflows/golangci-lint.yml@719b651276bdeca4bbc8d81e8a51d7fd02d1a17b # main
    with:
      working-directory: dotd
