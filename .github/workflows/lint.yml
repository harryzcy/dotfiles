name: Lint

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    name: Super Linter
    uses: harryzcy/github-actions/.github/workflows/linter.yml@78beed9d1ee1e70ead694737597a137ea9cd4322 # main

  go-lint:
    name: Go Lint
    uses: harryzcy/github-actions/.github/workflows/golangci-lint.yml@78beed9d1ee1e70ead694737597a137ea9cd4322 # main
    with:
      working-directory: dotd
