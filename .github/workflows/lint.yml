name: Lint

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    name: Super Linter
    uses: harryzcy/github-actions/.github/workflows/linter.yml@96c175a408fc7de445f2051d28c38ab6094b001f # main

  go-lint:
    name: Go Lint
    uses: harryzcy/github-actions/.github/workflows/golangci-lint.yml@96c175a408fc7de445f2051d28c38ab6094b001f # main
    with:
      working-directory: dotd
