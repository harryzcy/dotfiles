name: Lint

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    name: Super Linter
    uses: harryzcy/github-actions/.github/workflows/linter.yml@38ef6ea13dbde6399db653abb69139ac6a6be481 # main

  go-lint:
    name: Go Lint
    uses: harryzcy/github-actions/.github/workflows/golangci-lint.yml@38ef6ea13dbde6399db653abb69139ac6a6be481 # main
    with:
      working-directory: dotd
