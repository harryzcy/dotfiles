name: Lint

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  super-linter:
    name: Super Linter
    uses: harryzcy/github-actions/.github/workflows/linter.yml@7db4ba4b7f6c12ee772a016c68efd0672bff30ac # main

  go-lint:
    name: Go Lint
    uses: harryzcy/github-actions/.github/workflows/golangci-lint.yml@7db4ba4b7f6c12ee772a016c68efd0672bff30ac # main
    with:
      working-directory: dotd
